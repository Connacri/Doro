name: Rebase Branch
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  rebase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Rebase on master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          git checkout fix/p2p-messenger-reliability-12425407091972438373
          git rebase origin/master
          git push origin fix/p2p-messenger-reliability-12425407091972438373 --force-with-lease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
