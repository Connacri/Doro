<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DORO PROTOCOL | Multi-Node Network Simulator</title>
<style>
  :root{
    --bg:#050508; --surface:#0d0d14; --surface2:#161625; --surface3:#1e1e30;
    --primary:#00f2ff; --primary-dim:#008891;
    --success:#00ff88; --error:#ff3366; --warn:#ffcc00;
    --text:#e0e0ed; --muted:#70708f;
    --mono:'JetBrains Mono','SF Mono',monospace;
  }
  *{box-sizing:border-box; outline:none;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'Inter',-apple-system,sans-serif;
    height:100vh; display:flex; flex-direction:column; overflow:hidden;
  }

  header{
    height:72px; padding:0 24px; border-bottom:1px solid #ffffff10;
    display:flex; align-items:center; justify-content:space-between;
    background:rgba(18,18,30,0.8); backdrop-filter:blur(10px);
    gap:20px;
  }
  .logo-area{ display:flex; align-items:center; gap:16px; }
  .logo-area h1{ font-size:16px; margin:0; text-transform:uppercase; letter-spacing:3px; color:var(--primary); }
  .logo-badge{ background:var(--primary); color:#000; padding:2px 8px; border-radius:4px; font-size:9px; font-weight:900; letter-spacing:1px; }

  .stat-bar{ display:flex; gap:24px; font-family:var(--mono); font-size:11px; }
  .stat-item{ display:flex; flex-direction:column; align-items:center; }
  .stat-value{ font-size:18px; font-weight:bold; }
  .stat-label{ font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }

  main{ display:grid; grid-template-columns: 280px 1fr 320px; flex:1; overflow:hidden; }

  .nodes-panel{ border-right:1px solid #ffffff10; display:flex; flex-direction:column; background:var(--surface); }
  .panel-header{ padding:16px 20px; font-size:11px; font-weight:bold; text-transform:uppercase; color:var(--muted); border-bottom:1px solid #ffffff08; display:flex; justify-content:space-between; align-items:center; }
  .panel-header span{ color:var(--primary); }
  #peers-list{ flex:1; overflow-y:auto; padding:10px; }

  .peer-card{
    padding:14px; border-radius:10px; margin-bottom:8px; cursor:pointer;
    border:1px solid transparent; transition:0.2s; background: #ffffff02;
    position:relative;
  }
  .peer-card:hover{ background:#ffffff08; border-color:#ffffff15; }
  .peer-card.active{ background:rgba(0,242,255,0.08); border-color:var(--primary-dim); }
  .peer-card.offline{ opacity:0.35; filter:grayscale(0.8); }
  .peer-status{ width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:8px; }
  .peer-balance{ font-family:var(--mono); font-size:12px; margin-top:4px; }
  .peer-address{ font-size:9px; color:var(--muted); font-family:var(--mono); }

  .viewport{ display:flex; flex-direction:column; background:var(--bg); }
  .viewport-header{ padding:16px 24px; background:var(--surface2); display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #ffffff08; }
  .viewport-header h3{ margin:0; font-size:14px; }
  .viewport-header small{ color:var(--muted); font-family:var(--mono); font-size:10px; }

  .tab-container{ display:flex; gap:0; padding:0 20px; background:var(--surface2); border-bottom:1px solid #ffffff10; }
  .tab{ padding:14px 20px; font-size:12px; font-weight:600; cursor:pointer; color:var(--muted); border-bottom:2px solid transparent; transition:0.15s; user-select:none; }
  .tab:hover{ color:var(--text); }
  .tab.active{ color:var(--primary); border-color:var(--primary); }

  .content-area{ flex:1; overflow-y:auto; padding:20px; }

  .ledger-table{ width:100%; border-collapse:collapse; font-family:var(--mono); font-size:11px; }
  .ledger-table th{ text-align:left; color:var(--muted); padding:10px 12px; border-bottom:1px solid #ffffff10; font-size:10px; text-transform:uppercase; letter-spacing:1px; font-weight:600; }
  .ledger-table td{ padding:10px 12px; border-bottom:1px solid #ffffff05; }
  .ledger-table tr:hover td{ background:rgba(255,255,255,0.02); }

  .pill{ padding:2px 8px; border-radius:4px; font-size:9px; font-weight:bold; text-transform:uppercase; letter-spacing:0.5px; }
  .pill.SEND{ background:rgba(108,92,231,0.3); color:#a89bff; }
  .pill.RECEIVE{ background:rgba(0,208,132,0.3); color:var(--success); }
  .pill.BUY{ background:rgba(0,242,255,0.2); color:var(--primary); }
  .pill.SELL{ background:rgba(255,51,102,0.2); color:var(--error); }
  .pill.FILLED{ background:rgba(0,255,136,0.2); color:var(--success); }
  .pill.PENDING{ background:rgba(255,204,0,0.2); color:var(--warn); }

  .chat-box{ display:flex; flex-direction:column; gap:8px; padding:4px 0; }
  .msg{ padding:10px 14px; border-radius:12px; max-width:80%; font-size:12px; line-height:1.5; position:relative; }
  .msg.sent{ align-self:flex-end; background:var(--primary-dim); color:white; border-bottom-right-radius:2px; }
  .msg.received{ align-self:flex-start; background:var(--surface3); border-bottom-left-radius:2px; }
  .msg .meta{ font-size:9px; color:var(--muted); margin-top:4px; display:block; }
  .msg .from{ font-weight:600; color:var(--primary); }

  .orders-grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .order-book{ background:var(--surface); border-radius:10px; padding:16px; border:1px solid #ffffff08; }
  .order-book h4{ margin:0 0 12px 0; font-size:11px; text-transform:uppercase; letter-spacing:1px; }
  .order-row{ display:flex; justify-content:space-between; padding:6px 0; font-family:var(--mono); font-size:11px; border-bottom:1px solid #ffffff05; }

  .control-panel{ border-left:1px solid #ffffff10; padding:20px; background:var(--surface); overflow-y:auto; }
  .control-panel section{ margin-bottom:24px; }
  .control-panel h3{ font-size:11px; color:var(--primary); text-transform:uppercase; margin:0 0 12px 0; letter-spacing:1px; border-left:3px solid var(--primary); padding-left:10px; }

  .btn{
    background:var(--surface2); color:white; border:1px solid #ffffff12;
    padding:11px 14px; border-radius:8px; width:100%; text-align:left;
    font-size:12px; cursor:pointer; margin-bottom:8px; transition:0.2s;
    display:flex; align-items:center; gap:10px;
  }
  .btn:hover{ background:var(--primary-dim); border-color:var(--primary); }
  .btn.active{ background:var(--success); color:#000; border-color:var(--success); font-weight:bold; }
  .btn.danger{ color:var(--error); border-color:rgba(255,51,102,0.3); }
  .btn.danger:hover{ background:rgba(255,51,102,0.15); border-color:var(--error); }

  .log-container{ font-family:var(--mono); font-size:10px; height:220px; overflow-y:auto; background:#000; padding:12px; border-radius:8px; border:1px solid #ffffff08; }
  .log-entry{ padding:3px 0; border-bottom:1px solid #ffffff03; }
  .log-time{ color:var(--muted); }
  .log-ok{ color:var(--success); }
  .log-err{ color:var(--error); }
  .log-warn{ color:var(--warn); }

  .tps-bar{ display:flex; align-items:flex-end; gap:2px; height:40px; margin:8px 0; }
  .tps-bar-item{ width:100%; background:var(--primary); border-radius:2px 2px 0 0; min-height:2px; transition:0.3s; }

  .badge{ padding:2px 6px; border-radius:3px; font-size:8px; font-weight:bold; text-transform:uppercase; }
  .badge-online{ background:rgba(0,255,136,0.2); color:var(--success); }
  .badge-offline{ background:rgba(255,51,102,0.2); color:var(--error); }

  .network-graph{ display:flex; justify-content:center; gap:40px; padding:30px; flex-wrap:wrap; }
  .graph-node{ display:flex; flex-direction:column; align-items:center; gap:6px; }
  .graph-node .circle{ width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:14px; border:2px solid var(--primary-dim); transition:0.3s; }
  .graph-node .circle.online{ border-color:var(--success); box-shadow:0 0 20px rgba(0,255,136,0.2); }
  .graph-node .circle.offline{ border-color:var(--error); opacity:0.5; }
  .graph-conn{ color:var(--muted); font-size:10px; margin-top:6px; }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <h1>DORO</h1>
    <span class="logo-badge">MULTI-NODE LAB</span>
  </div>
  <div class="stat-bar">
    <div class="stat-item"><span class="stat-value" id="stat-nodes" style="color:var(--primary)">0</span><span class="stat-label">NŒUDS</span></div>
    <div class="stat-item"><span class="stat-value" id="stat-tps" style="color:var(--success)">0.0</span><span class="stat-label">TPS MOYEN</span></div>
    <div class="stat-item"><span class="stat-value" id="stat-blocks" style="color:var(--warn)">0</span><span class="stat-label">BLOCS TOTAUX</span></div>
    <div class="stat-item"><span class="stat-value" id="stat-orders" style="color:#a89bff">0</span><span class="stat-label">ORDRES OTC</span></div>
    <div class="stat-item"><span class="stat-value" id="stat-chat" style="color:#ffcc00">0</span><span class="stat-label">MESSAGES</span></div>
  </div>
  <button class="btn" style="width:auto; margin:0; padding:8px 16px;" onclick="showReadme()">README</button>
</header>

<main>
  <aside class="nodes-panel">
    <div class="panel-header">Pair du réseau <span>●</span></div>
    <div id="peers-list"></div>
    <div style="padding:12px 16px; border-top:1px solid #ffffff08; display:flex; gap:8px;">
      <button class="btn" style="text-align:center; border-color:var(--primary); color:var(--primary); flex:1;" onclick="spawnPeer()">+ NŒUD</button>
      <button class="btn" style="text-align:center; flex:0; width:auto;" onclick="spawnPeerPreset()">🎲 ALÉATOIRE</button>
    </div>
  </aside>

  <div class="viewport">
    <div class="viewport-header">
      <div>
        <h3 id="active-node-name">Sélectionnez un nœud</h3>
        <small id="active-node-address"></small>
      </div>
      <div id="active-node-badge"></div>
    </div>

    <div class="tab-container">
      <div class="tab active" onclick="switchTab('ledger')">📦 DAG Ledger</div>
      <div class="tab" onclick="switchTab('messages')">💬 Communications</div>
      <div class="tab" onclick="switchTab('market')">🏪 Marché OTC</div>
      <div class="tab" onclick="switchTab('viz')">🌐 Vue réseau</div>
    </div>

    <div id="main-content" class="content-area"></div>
  </div>

  <aside class="control-panel">
    <section>
      <h3>🤖 Agents autonomes</h3>
      <button id="btn-auto-chat" class="btn" onclick="toggleAuto('chat')">💬 Chat automatique (continu)</button>
      <button id="btn-auto-tx" class="btn" onclick="toggleAuto('tx')">💸 Stress-Test Transactions</button>
      <button id="btn-auto-market" class="btn" onclick="toggleAuto('market')">🏪 Market Making OTC</button>
      <button id="btn-auto-chaos" class="btn" onclick="toggleAuto('chaos')">⚡ Chaos Engine (auto)</button>
    </section>

    <section>
      <h3>⚠️ Chaos manuel</h3>
      <button class="btn" onclick="chaosDisconnect()">📉 Déconnecter nœud aléatoire</button>
      <button class="btn" onclick="chaosLatency()">⏱️ Pics de latence</button>
      <button class="btn" onclick="chaosPartition()">🔀 Partition réseau (50% nœuds)</button>
      <button class="btn danger" onclick="resetNetwork()">💀 Wipe & Reset</button>
    </section>

    <section>
      <h3>📊 Traffic en direct</h3>
      <div id="tps-chart" class="tps-bar"></div>
      <div class="log-container" id="global-logs"></div>
    </section>
  </aside>
</main>

<script>
// ===== CORE SIMULATION ENGINE =====

class Network {
  constructor() {
    this.peers = new Map();
    this.totalBlocks = 0;
    this.totalMessages = 0;
    this.totalOrders = 0;
    this.tpsHistory = [];
    this.ticks = 0;
    this.lastBlockCount = 0;
    this.partitionMode = false;
  }
  register(peer) { this.peers.set(peer.address, peer); }
  unregister(addr) { this.peers.delete(addr); }

  broadcast(senderAddr, packet, delayOverride) {
    this.peers.forEach(peer => {
      if (peer.address !== senderAddr && peer.online) {
        const baseDelay = this.partitionMode ? 300 + Math.random() * 700 : 30 + Math.random() * 200;
        const jitter = peer.latencyMultiplier * 100;
        const delay = delayOverride ?? (baseDelay + jitter);
        setTimeout(() => peer.handleIncoming(packet), delay);
      }
    });
  }

  get onlinePeers() {
    return Array.from(this.peers.values()).filter(p => p.online);
  }

  get tps() {
    if (this.tpsHistory.length === 0) return 0;
    const sum = this.tpsHistory.reduce((a, b) => a + b, 0);
    return sum / this.tpsHistory.length;
  }

  recordTick() {
    const newBlocks = this.totalBlocks - this.lastBlockCount;
    this.lastBlockCount = this.totalBlocks;
    this.tpsHistory.push(newBlocks);
    if (this.tpsHistory.length > 15) this.tpsHistory.shift();
    this.ticks++;
  }
}

const GlobalNet = new Network();

const NAMES = ['Alice', 'Bob', 'Charlie', 'Dave', 'Eve', 'Fiona', 'George', 'Hannah'];
const CRYPTO_PHRASES = [
  "Doro to the moon 🚀", "HODL strong!", "Best P2P ever", "No central limit 💪",
  "Réseau décentralisé 🔥", "Send it!", "Zero fees baby!", "Doro > Bitcoin",
  "Full mesh network", "Vive le DAG", "Trust the code", "No rug here 🤝",
  "Test en cours...", "Sybil resistant", "Instant finality ⚡",
  "Je hodl mes Doro", "LFG!!!", "To the stars 🌟", "Doro powered",
  "P2P c'est la vie", "Respect the protocol", "Chaine de blocs nano",
];

const BUY_PHRASES = ["ACHAT", "BUY", "LONG"];
const SELL_PHRASES = ["VENTE", "SELL", "SHORT"];

function randomHex(len) {
  return Array.from({length: len}, () => Math.floor(Math.random()*16).toString(16)).join('');
}

class Peer {
  constructor(name) {
    this.name = name;
    this.address = '0x' + randomHex(40);
    this.online = true;
    this.latencyMultiplier = 0.5 + Math.random();
    this.ledger = new Map();
    this.balances = new Map();
    this.messages = [];
    this.orders = [];
    this.trades = [];
    this.autoAgents = { chat: false, tx: false, market: false, chaos: false };
    this.chatCooldown = 0;
    this.txCooldown = 0;
    this.marketCooldown = 0;
    this.receiveQueue = [];

    GlobalNet.register(this);
  }

  handleIncoming(packet) {
    if (!this.online) return;
    switch(packet.type) {
      case 'BLOCK':
        if (!this.ledger.has(packet.data.id)) {
          this.applyBlock(packet.data, true);
        }
        break;
      case 'CHAT':
        if (packet.data.to === this.address) {
          this.messages.push(packet.data);
          GlobalNet.totalMessages++;
        }
        break;
      case 'ORDER':
        if (packet.data.target === this.address) {
          this.orders.push(packet.data);
        }
        break;
      case 'TRADE_EXEC':
        this.trades.push(packet.data);
        break;
    }
    updateUI();
  }

  applyBlock(block, isGossip = false) {
    if (this.ledger.has(block.id)) return;

    if (block.type === 'SEND') {
      const fromBal = this.balances.get(block.from) || 0;
      if (fromBal < block.amount) return; // Rejet si solde insuffisant
      this.balances.set(block.from, fromBal - block.amount);
    } else if (block.type === 'RECEIVE') {
      const toBal = this.balances.get(block.to) || 0;
      this.balances.set(block.to, toBal + block.amount);
    }

    this.ledger.set(block.id, block);
    if (!isGossip) GlobalNet.broadcast(this.address, { type: 'BLOCK', data: block });
    GlobalNet.totalBlocks++;
  }

  createSend(to, amount) {
    const id = 'TX-' + randomHex(8);
    const block = { id, type:'SEND', from:this.address, to, amount, ts:Date.now() };
    this.applyBlock(block);
    return block;
  }

  createReceive(sendBlock) {
    if (!this.ledger.has(sendBlock.id)) return null;
    const id = 'RX-' + randomHex(8);
    const block = { id, type:'RECEIVE', from:sendBlock.from, to:this.address, amount:sendBlock.amount, ts:Date.now() };
    this.applyBlock(block);
    return block;
  }

  // ===== AUTO CHAT =====
  autoChat() {
    if (!this.online || this.chatCooldown > 0) { this.chatCooldown--; return; }
    const others = GlobalNet.onlinePeers.filter(p => p.address !== this.address);
    if (others.length === 0) return;

    const target = others[Math.floor(Math.random() * others.length)];
    const phrase = CRYPTO_PHRASES[Math.floor(Math.random() * CRYPTO_PHRASES.length)];
    const text = `${phrase} [from ${this.name}]`;
    const msg = { from: this.address, to: target.address, text, ts: Date.now() };

    this.messages.push(msg);
    GlobalNet.broadcast(this.address, { type: 'CHAT', data: msg });
    GlobalNet.totalMessages++;
    this.chatCooldown = 1 + Math.floor(Math.random() * 3);
  }

  // ===== AUTO TRANSACTIONS =====
  autoTx() {
    if (!this.online || this.txCooldown > 0) { this.txCooldown--; return; }
    const myBal = this.balances.get(this.address) || 0;
    if (myBal < 2) return;

    const others = GlobalNet.onlinePeers.filter(p => p.address !== this.address);
    if (others.length === 0) return;

    const target = others[Math.floor(Math.random() * others.length)];
    const amount = 1 + Math.floor(Math.random() * Math.min(20, myBal - 1));
    const block = this.createSend(target.address, amount);

    // Le destinataire reclame automatiquement apres un delai
    if (block) {
      setTimeout(() => {
        const p = GlobalNet.peers.get(target.address);
        if (p && p.online) p.createReceive(block);
      }, 200 + Math.random() * 600);
    }
    this.txCooldown = Math.floor(Math.random() * 2);
  }

  // ===== AUTO MARKET (OTC) =====
  autoMarket() {
    if (!this.online || this.marketCooldown > 0) { this.marketCooldown--; return; }
    const myBal = this.balances.get(this.address) || 0;

    // Publier une offre
    if (myBal > 20 && Math.random() > 0.5) {
      const side = Math.random() > 0.5 ? 'SELL' : 'BUY';
      const amount = 1 + Math.floor(Math.random() * Math.min(10, myBal - 1));
      const price = 0.5 + Math.random() * 2;
      const order = {
        id: 'ORD-' + randomHex(6),
        peer: this.address,
        peerName: this.name,
        side, amount, price: price.toFixed(2),
        status: 'PENDING', ts: Date.now()
      };
      this.orders.push(order);
      GlobalNet.totalOrders++;
      GlobalNet.broadcast(this.address, { type: 'ORDER', data: order });
    }

    // Matcher des ordres
    for (const order of this.orders) {
      if (order.status !== 'PENDING') continue;
      if (order.peer === this.address) continue;
      if (order.side === 'SELL' && (this.balances.get(this.address) || 0) >= order.amount) {
        // J'achete cette offre SELL
        const buyBlock = this.createSend(order.peer, order.amount);
        order.status = 'FILLED';
        const trade = { orderId: order.id, buyer: this.name, seller: order.peerName, amount: order.amount, price: order.price, ts: Date.now() };
        this.trades.push(trade);
        GlobalNet.broadcast(this.address, { type: 'TRADE_EXEC', data: trade });
        if (buyBlock) {
          setTimeout(() => {
            const seller = GlobalNet.peers.get(order.peer);
            if (seller && seller.online) seller.createReceive(buyBlock);
          }, 300);
        }
        break;
      }
      if (order.side === 'BUY' && (myBal) >= order.amount) {
        // Je vends a cette offre BUY
        const sellBlock = this.createSend(order.peer, order.amount);
        order.status = 'FILLED';
        const trade = { orderId: order.id, seller: this.name, buyer: order.peerName, amount: order.amount, price: order.price, ts: Date.now() };
        this.trades.push(trade);
        GlobalNet.broadcast(this.address, { type: 'TRADE_EXEC', data: trade });
        if (sellBlock) {
          setTimeout(() => {
            const buyer = GlobalNet.peers.get(order.peer);
            if (buyer && buyer.online) buyer.createReceive(sellBlock);
          }, 300);
        }
        break;
      }
    }

    this.marketCooldown = 1 + Math.floor(Math.random() * 2);
  }

  tick() {
    if (!this.online) return;

    if (this.autoAgents.chat) this.autoChat();
    if (this.autoAgents.tx) this.autoTx();
    if (this.autoAgents.market) this.autoMarket();
  }
}

// ===== UI =====

let activeAddr = null;
let activeTab = 'ledger';

const PEER_COLORS = ['#00ff88', '#00f2ff', '#a89bff', '#ffcc00', '#ff3366', '#ff8844', '#44ffaa', '#ff66cc'];

function spawnPeer(preset) {
  let name;
  if (preset) {
    name = preset;
  } else {
    const used = new Set(Array.from(GlobalNet.peers.values()).map(p => p.name));
    const available = NAMES.filter(n => !used.has(n));
    name = available.length > 0 ? available[0] : "NODE_" + (GlobalNet.peers.size + 1);
  }

  const p = new Peer(name);
  const initialBal = 2000 + Math.floor(Math.random() * 8000);
  p.balances.set(p.address, initialBal);

  if (!activeAddr) activeAddr = p.address;
  logGlobal(`✅ ${p.name} rejoint le réseau — ${initialBal} DORO`, 'ok');
  updateUI();
}

function spawnPeerPreset() {
  const used = new Set(Array.from(GlobalNet.peers.values()).map(p => p.name));
  const available = NAMES.filter(n => !used.has(n));
  if (available.length === 0) {
    spawnPeer("NODE_" + (GlobalNet.peers.size + 1));
  } else {
    spawnPeer(available[Math.floor(Math.random() * available.length)]);
  }
}

function updateUI() {
  document.getElementById('stat-nodes').innerText = GlobalNet.peers.size;
  document.getElementById('stat-blocks').innerText = GlobalNet.totalBlocks;
  document.getElementById('stat-chat').innerText = GlobalNet.totalMessages;
  document.getElementById('stat-orders').innerText = GlobalNet.totalOrders;

  const list = document.getElementById('peers-list');
  list.innerHTML = '';
  let idx = 0;
  GlobalNet.peers.forEach(p => {
    const color = PEER_COLORS[idx % PEER_COLORS.length];
    const bal = p.balances.get(p.address) || 0;
    const div = document.createElement('div');
    div.className = `peer-card ${p.address === activeAddr ? 'active' : ''} ${p.online ? '' : 'offline'}`;

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));

function toggleAuto(type) {
  const p = GlobalNet.peers.get(activeAddr);
  if (p) {
    p.autoAgents[type] = !p.autoAgents[type];
    document.getElementById(`btn-auto-${type}`).classList.toggle('active');
    logGlobal(`${p.name}: Agent "${type}" ${p.autoAgents[type] ? 'ACTIVÉ ✅' : 'DÉSACTIVÉ'}`, p.autoAgents[type] ? 'ok' : 'warn');
  }
}

function chaosDisconnect() {
  const online = GlobalNet.onlinePeers;
  if (online.length === 0) return;
  const p = online[Math.floor(Math.random() * online.length)];
  p.online = false;
  logGlobal(`⚡ CHAOS: ${p.name} DÉCONNECTÉ du réseau`, 'err');
  updateUI();

  // Tentative de reconnexion automatique après un délai
  setTimeout(() => {
    if (!p.online && GlobalNet.peers.has(p.address)) {
      p.online = true;
      logGlobal(`🔁 ${p.name} s'est RECONNECTÉ au réseau`, 'ok');
      updateUI();
    }
  }, 3000 + Math.random() * 7000);
}

function chaosLatency() {
  const peers = Array.from(GlobalNet.peers.values());
  peers.forEach(p => {
    p.latencyMultiplier = 3 + Math.random() * 5;
  });
  logGlobal(`⏱️ CHAOS: Pics de latence injectés (${(peers[0]?.latencyMultiplier || 0).toFixed(1)}x)`, 'warn');
  setTimeout(() => {
    peers.forEach(p => p.latencyMultiplier = 0.5 + Math.random());
    logGlobal(`🔄 Latence revenue à la normale`, 'ok');
  }, 8000);
}

function chaosPartition() {
  const peers = Array.from(GlobalNet.peers.values());
  const half = Math.ceil(peers.length / 2);
  const shuffled = [...peers].sort(() => Math.random() - 0.5);
  const toKill = shuffled.slice(0, half);
  toKill.forEach(p => { p.online = false; });
  GlobalNet.partitionMode = true;
  logGlobal(`🔀 CHAOS: Partition réseau — ${toKill.length} nœuds isolés`, 'err');
  updateUI();

  setTimeout(() => {
    peers.forEach(p => { p.online = true; });
    GlobalNet.partitionMode = false;
    logGlobal(`🔄 Partition résorbée, réseau unifié`, 'ok');
    updateUI();
  }, 10000);
}

// ===== GLOBAL AUTO CHAOS ENGINE =====
let chaosInterval = null;

function autoChaosTick() {
  if (GlobalNet.onlinePeers.length === 0) return;
  const roll = Math.random();
  if (roll < 0.3) {
    chaosDisconnect();
  } else if (roll < 0.45) {
    chaosLatency();
  } else if (roll < 0.55) {
    chaosPartition();
  }
}

// ===== LOGGING =====

function logGlobal(msg, level = 'info') {
  const l = document.getElementById('global-logs');
  const d = document.createElement('div');
  d.className = 'log-entry';
  const cls = level === 'ok' ? 'log-ok' : level === 'err' ? 'log-err' : level === 'warn' ? 'log-warn' : '';
  d.innerHTML = `<span class="log-time">[${new Date().toLocaleTimeString()}]</span> <span class="${cls}">${msg}</span>`;
  l.prepend(d);
  // Limiter le nombre de logs
  while (l.children.length > 100) l.removeChild(l.lastChild);
}

// ===== TPS CHART =====
function updateTPSChart() {
  const chart = document.getElementById('tps-chart');
  const history = GlobalNet.tpsHistory;
  chart.innerHTML = history.map(v => {
    const h = Math.min(100, v * 20);
    return `<div class="tps-bar-item" style="height:${Math.max(2, h)}%; background:${v > 5 ? 'var(--success)' : v > 2 ? 'var(--primary)' : 'var(--muted)'}"></div>`;
  }).join('');
  document.getElementById('stat-tps').innerText = GlobalNet.tps.toFixed(1);
}

function readTps() {
  // On prend le nombre de nouveaux blocs dans les 2 dernieres secondes
  const current = GlobalNet.totalBlocks;
  if (GlobalNet._lastTpsCheck === undefined) {
    GlobalNet._lastTpsCheck = current;
    GlobalNet._lastTpsTime = Date.now();
    return;
  }
  const elapsed = (Date.now() - GlobalNet._lastTpsTime) / 1000;
  if (elapsed > 0) {
    const tps = (current - GlobalNet._lastTpsCheck) / elapsed;
    GlobalNet.tpsHistory.push(tps);
    if (GlobalNet.tpsHistory.length > 20) GlobalNet.tpsHistory.shift();
  }
  GlobalNet._lastTpsCheck = current;
  GlobalNet._lastTpsTime = Date.now();
  updateTPSChart();
}

// ===== MAIN LOOP =====
setInterval(() => {
  GlobalNet.peers.forEach(p => p.tick());

  // Check auto-chaos
  let anyChaos = false;
  GlobalNet.peers.forEach(p => { if (p.autoAgents.chaos) anyChaos = true; });
  if (anyChaos && !chaosInterval) {
    chaosInterval = setInterval(autoChaosTick, 3000);
  } else if (!anyChaos && chaosInterval) {
    clearInterval(chaosInterval);
    chaosInterval = null;
  }

  readTps();
  updateUI();
}, 1000);
